backend:
  name: git-gateway
  branch: main

media_folder: assets/uploads
public_folder: assets/uploads

locale: ko

collections:
  - name: news
    label: 공지사항
    label_singular: 공지글
    folder: _data/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 날짜, name: date, widget: datetime, format: "YYYY.MM.DD", date_format: "YYYY.MM.DD", time_format: false }
      - label: 분류
        name: category
        widget: select
        options: [공지, 모집, 소식, 보고]
        default: 공지
      - { label: 내용, name: body, widget: markdown }

  - name: gallery
    label: 활동 갤러리
    label_singular: 사진
    folder: _data/gallery
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 날짜, name: date, widget: datetime, format: "YYYY.MM", date_format: "YYYY.MM", time_format: false }
      - { label: 사진, name: image, widget: image }
      - { label: 설명 (선택), name: description, widget: string, required: false }
